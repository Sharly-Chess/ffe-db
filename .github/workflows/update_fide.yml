name: FIDE Database Update

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fide-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install requests
          pip install cryptography

      - name: Generate FIDE SQLite database
        env:
          ENC_PASSWORD: ${{ secrets.FIDE_DATABASE_ENC_PASSWORD }}
        run: python fide/generate_fide_sqlite.py --key="$ENC_PASSWORD"

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ENC_DB_FILENAME=$(python -c "from fide.generate_fide_sqlite import FideSqliteGenerator as sqlite_generator; print(sqlite_generator().output_file)")
          TAG="fide-latest"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" "$ENC_DB_FILENAME" \
            --title "FIDE Database" \
            --notes "Auto-updated daily" \
            --latest=false
