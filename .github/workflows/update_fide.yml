name: FIDE Database Update

on:
  schedule:
    - cron: '0 5 * * *'  # 5am UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fide-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests

      - name: Generate FIDE SQLite database
        run: python generate_fide_sqlite.py

      - name: Zip database with password
        env:
          ZIP_PASSWORD: ${{ secrets.FIDE_DATABASE_ZIP_PASSWORD }}
        run: |
          DB_FILENAME=$(python -c "from generate_fide_sqlite import DB_FILENAME; print(DB_FILENAME)")
          zip -P "$ZIP_PASSWORD" "${DB_FILENAME%.db}.zip" "$DB_FILENAME"

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DB_FILENAME=$(python -c "from generate_fide_sqlite import DB_FILENAME; print(DB_FILENAME)")
          ZIP_FILENAME="${DB_FILENAME%.db}.zip"
          TAG="fide-latest"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" "$ZIP_FILENAME" \
            --title "FIDE Database" \
            --notes "Auto-updated daily" \
            --latest=false
